<div class="modal-overlay" (click)="onCancel()"></div>
<div class="confirm-dialog">
 
  <div class="gen-icon">⚡</div>
  <h3>Generate Monthly Rent</h3>
  <p>Creates rent records for all active tenants for the selected month.</p>
 
  @if (errorMsg) {
    <div class="gen-error">⚠ {{ errorMsg }}</div>
  }
 
  @if (successMsg) {
    <div class="gen-success">✅ {{ successMsg }}</div>
  }
 
  @if (!successMsg) {
    <form [formGroup]="generateForm" (ngSubmit)="onSubmit()" class="gen-form">
      <div class="form-row">
        <div class="form-group">
          <label>Month</label>
          <select formControlName="month">
            @for (m of months; track m) {
              <option [value]="m">{{ MONTH_NAMES[m] }}</option>
            }
          </select>
        </div>
        <div class="form-group">
          <label>Year</label>
          <select formControlName="year">
            @for (y of years; track y) {
              <option [value]="y">{{ y }}</option>
            }
          </select>
        </div>
      </div>
      <div class="gen-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isLoading">
          @if (isLoading) { Generating... } @else { Generate Records }
        </button>
      </div>
    </form>
  }
</div>
